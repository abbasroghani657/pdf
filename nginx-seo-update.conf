server {
    listen 80;
    server_name theylovepdf.com www.theylovepdf.com;

    root /var/www/pdf-toolkit-react/dist;
    index index.html;

    # 1. First attempt to serve the exact file (e.g., .css, .js, images)
    # 2. Then attempt to serve the prerendered HTML file if it exists at $uri/index.html
    # 3. Then try $uri.html (some prerenderers do this instead)
    # 4. Finally fallback to the main SPA index.html
    location / {
        try_files $uri $uri/index.html $uri.html /index.html;
    }

    # Optional: Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
